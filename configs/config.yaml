# Chess Pattern Recognition Configuration

data:
  dataset_name: "angeluriot/chess_games"
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  min_elo: 2000
  max_games: null  # null = use all games
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

model:
  move_predictor:
    architecture: "transformer"
    d_model: 256
    n_heads: 8
    n_layers: 6
    dropout: 0.1
    max_seq_len: 512
    learning_rate: 0.0001
    batch_size: 256
    epochs: 50

  pattern_recognizer:
    architecture: "cnn_attention"
    channels: [64, 128, 256]
    learning_rate: 0.0003
    batch_size: 128
    epochs: 30

  opening_classifier:
    architecture: "lstm"
    hidden_size: 128
    n_layers: 2
    learning_rate: 0.001
    batch_size: 512
    epochs: 20

  game_evaluator:
    algorithm: "xgboost"
    n_estimators: 500
    max_depth: 8
    learning_rate: 0.05

engine:
  bot_default_elo: 1500
  search_depth: 5
  temperature: 0.8
  top_k: 10

analysis:
  best_games_top_n: 100
  pattern_min_frequency: 50
  move_combo_min_games: 100

training:
  device: "auto"  # auto, cpu, cuda, mps
  num_workers: 4
  save_every_n_epochs: 5
  early_stopping_patience: 10
  checkpoint_dir: "models/saved"
  log_dir: "results/metrics"
